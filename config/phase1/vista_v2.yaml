# =============================================================================
# rr — VISTA-v2 BASE config (ResNet-101 + UNet++, NIR-free [G,R,NGRDI] input).
# The 4 PE variants `extends:` this and override ONLY model.pe.type, so every
# variant runs with the SAME command. See docs/vista_v2.md.
# =============================================================================
extends: config.yaml

arm:
  name: vista
  description: "VISTA-v2 — ResNet-101 + UNet++ with pluggable positional encoding."

data:
  channels: [green, red, ngrdi]   # NIR-free, domain-invariant (DeepGlobe ↔ LISS-IV)
  # 3-ch norm for [green, red, ngrdi] (overrides config.yaml's 4-ch [G,R,NIR,NDVI]).
  # green/red == band_statistics.csv; ngrdi computed = (green-red)/(green+red) over tiles.
  norm:
    mean: [106.059, 95.983, 0.0575]
    std:  [21.483, 27.295, 0.0493]
  cv:
    scheme: spatial_block
    n_folds: 7                     # raised from 5 for stronger paired stats
  # NOTE: NIR dropped as a model input. The canopy mask used by Occlusion-Recall +
  # canopy-weighted loss is the precomputed `canopy` already in the tiles. For a
  # fresh NIR-free ingest, derive canopy from NGRDI (threshold) instead of NDVI.

model:
  arch: vista_v2
  in_channels: 3                   # [G,R,NGRDI]; sincos PE adds channels INTERNALLY
  classes: 1
  encoder: resnet101               # the v2 backbone
  encoder_weights: imagenet
  pe:
    type: botnet                   # botnet | rope | sincos | nope  (overridden per variant)
    heads: 8                       # bottleneck attention heads (botnet/rope)
    sincos_freqs: 2                # input-PE frequencies (sincos) -> 8 channels

train:
  # [G,R,NGRDI] is identical on pretrain AND fine-tune (both 3-ch), so the warm-start
  # loads the conv1 stem VERBATIM — NO inflation, NO NIR/NDVI added. init_inflate_stem
  # is a no-op for a 3->3 match; set false to make that explicit.
  init_from: runs/train/vista__vista_v2-nope__pretrain__20260629_231339/best.pt           # -> runs/train/<vista_v2 pretrain>/best.pt after Stage A
  init_inflate_stem: false

# loss / eval inherited from config.yaml (BCE+Dice+clDice, canopy_weight,
# cosine LR + warmup + early-stop, Occlusion-Recall monitor).
