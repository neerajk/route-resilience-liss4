# =============================================================================
# rr — GPU / real-training config.
#
# USE: real training on a CUDA GPU. Inherits EVERYTHING from config.yaml (model,
# data, normalization, LR schedule, early-stop, spatial-block CV, augmentation)
# and overrides only the machine knobs (bigger batch/workers/epochs + AMP).
#   python -m src.phase1.vista.train --config config/phase1/config_gpu.yaml
# device-dynamic: runtime.device=auto picks CUDA automatically.
#
# ARCHITECTURE: defaults to the ResNet34 baseline (from config.yaml). To train the
# ADVANCED SegFormer / MiT-B2 transformer instead (attention bridges canopy gaps),
# UNCOMMENT the `model:` block at the bottom AND set train.batch_size: 12 below.
# =============================================================================
extends: config.yaml      # single source of truth = config.yaml

runtime:
  device: auto            # auto -> CUDA on the GPU box

train:
  epochs: 50             # real run (raise as needed)
  batch_size: 12          # ResNet34: 16-32. For SegFormer/mit_b2 use ~12 (≈2x memory).
  num_workers: 8          # 4-8 on CUDA/cloud
  amp: true               # mixed precision + GradScaler (CUDA only)
  lr: 0.001
  weight_decay: 0.0001
  # warm-start from the SegFormer DeepGlobe pretrain (matches this config's mit_b2)
  init_from: runs/train/segformer-mit_b2_pretrain_20260628_123245/best.pt
  init_inflate_stem: true

loss:
  cldice_iters: 10        # GPU has memory; full topology term

# ---- ADVANCED: SegFormer (MiT-B2 transformer) ------------------------------- #
# To train the transformer instead of the ResNet baseline:
#  1. uncomment the block below, 2. set train.batch_size: 12 above (OOM-safe).
# Keep encoder == your DeepGlobe-pretrain encoder so warm-start weights transfer.
model:
  arch: smp
  decoder: segformer        # all-MLP SegFormer head (smp.Segformer; needs smp>=0.4)
  encoder: mit_b2           # MiT-B2 transformer backbone (attention)
  encoder_weights: null # ImageNet-pretrained MiT; stem inflated 3->in_channels
  stem_init: inflate
